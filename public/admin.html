<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RMX3031 Admin V2.1</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Outfit:wght@400;600;800&family=Archivo+Black&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #1a2e26; --surface: #243d34; --surface2: #2d4a3e;
    --border: rgba(143, 188, 143, 0.2); --accent: #8fbc8f;
    --text: #f5f5f0; --muted: rgba(245, 245, 240, 0.5);
    --red: #fca5a5; --blue: #7dd3fc;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg); color: var(--text); font-family: 'Outfit', sans-serif; min-height: 100vh; padding: 20px; }
  .container { max-width: 900px; margin: 0 auto; }
  header { margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.2); padding: 20px; border-radius: 20px; }
  .badge { padding: 4px 12px; background: var(--surface2); border: 1px solid var(--border); border-radius: 20px; font-family: 'JetBrains Mono'; font-size: 10px; color: var(--accent); }
  h1 { font-family: 'Archivo Black'; font-size: 24px; text-transform: uppercase; }
  h1 span { color: var(--accent); }

  .nav-tabs { display: flex; gap: 10px; margin-bottom: 20px; background: var(--surface); padding: 10px; border-radius: 20px; border: 1px solid var(--border); }
  .nav-tab { flex: 1; background: transparent; border: none; color: var(--muted); font-weight: 800; cursor: pointer; padding: 12px; border-radius: 12px; transition: 0.2s; font-size: 13px; }
  .nav-tab.active { background: var(--accent); color: var(--bg); }

  .panel { display: none; }
  .panel.active { display: block; }
  
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 24px; padding: 25px; margin-bottom: 20px; }
  .card-title { font-size: 11px; font-family: 'JetBrains Mono'; color: var(--accent); margin-bottom: 20px; text-transform: uppercase; letter-spacing: 1px; }

  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
  .form-group { display: flex; flex-direction: column; gap: 5px; }
  .full { grid-column: 1 / -1; }
  label { font-size: 10px; font-family: 'JetBrains Mono'; color: var(--muted); text-transform: uppercase; }
  input, select, textarea { background: var(--surface2); border: 1px solid var(--border); border-radius: 12px; padding: 12px; color: var(--text); outline: none; font-family: 'Outfit'; font-size: 14px; width: 100%; }
  
  .btn { padding: 12px 24px; border-radius: 12px; border: none; font-weight: 800; cursor: pointer; transition: 0.2s; font-family: 'Outfit'; display: inline-flex; align-items: center; justify-content: center; gap: 8px; }
  .btn:active { transform: scale(0.95); }
  .btn-primary { background: var(--accent); color: var(--bg); width: 100%; }
  .btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
  .btn-danger { background: rgba(252, 165, 165, 0.1); color: var(--red); border: 1px solid var(--red); }

  .entry-item { display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; background: var(--surface2); border-radius: 15px; margin-bottom: 10px; }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #444; }
  .status-dot.active { background: #8fbc8f; box-shadow: 0 0 8px #8fbc8f; }

  .loading-overlay { position: fixed; inset: 0; background: rgba(26, 46, 38, 0.9); display: none; justify-content: center; align-items: center; z-index: 9000; backdrop-filter: blur(5px); }
  #toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(100px); padding: 12px 30px; background: var(--accent); color: var(--bg); border-radius: 50px; font-weight: 800; transition: 0.4s; z-index: 9999; }
  #toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div class="loading-overlay" id="loader">
  <div style="color:var(--accent); font-family:'Archivo Black'">SYNCING...</div>
</div>

<div class="container">
  <header>
    <div>
      <div class="badge">V2.1 STABLE</div>
      <h1>Archive <span>Admin</span></h1>
    </div>
    <div style="display:flex; align-items:center; gap:10px">
      <div id="statusText" style="font-family:'JetBrains Mono'; font-size:10px; color:var(--muted)">OFFLINE</div>
      <div class="status-dot" id="statusDot"></div>
    </div>
  </header>

  <div class="card" id="configCard">
    <div class="card-title">1. Connection</div>
    <div style="display:flex; gap:10px">
      <input type="password" id="ghToken" placeholder="GitHub Token" style="flex:2" />
      <input type="text" id="ghRepo" placeholder="Repo (rmx3031-archive)" style="flex:1" />
      <button class="btn btn-primary" style="width:auto" onclick="connect()">Connect</button>
    </div>
  </div>

  <div class="nav-tabs">
    <button class="nav-tab active" id="tab-add" onclick="showPanel('add')">Add Entry</button>
    <button class="nav-tab" id="tab-browse" onclick="showPanel('browse')">Browse Files</button>
    <button class="nav-tab" id="tab-tabs" onclick="showPanel('tabs')">Manage Tabs</button>
  </div>

  <!-- Panel: Add -->
  <div id="panel-add" class="panel active">
    <div class="card">
      <div class="card-title">New Entry Details</div>
      <div class="form-grid">
        <div class="form-group"><label>Category</label><select id="f-tab"></select></div>
        <div class="form-group"><label>Name</label><input type="text" id="f-name" /></div>
        <div class="form-group"><label>Version</label><input type="text" id="f-ver" /></div>
        <div class="form-group"><label>Size</label><input type="text" id="f-size" /></div>
        <div class="form-group"><label>Date</label><input type="date" id="f-date" /></div>
        <div class="form-group" id="f-android-group"><label>Android</label><input type="text" id="f-android" value="16" /></div>
        <div class="form-group full">
          <label>URL (Auto-parses Archive.org)</label>
          <input type="text" id="f-url" placeholder="Paste URL here..." oninput="parseUrl(this.value)" />
        </div>
        <div class="form-group full"><label>Changelog</label><textarea id="f-changelog"></textarea></div>
      </div>
      <button class="btn btn-primary" style="margin-top:20px" id="saveBtn" onclick="saveEntry()">Publish to GitHub</button>
    </div>
  </div>

  <!-- Panel: Browse -->
  <div id="panel-browse" class="panel">
    <div class="card">
      <div class="card-title">Select Category</div>
      <select id="b-tab" onchange="renderEntries()"></select>
      <div id="entryList" style="margin-top:20px">Connect to see entries.</div>
    </div>
  </div>

  <!-- Panel: Tabs -->
  <div id="panel-tabs" class="panel">
    <div class="card">
      <div class="card-title">Current Tabs</div>
      <div id="tabList">Connect to see tabs.</div>
      <div style="margin-top:20px; display:flex; gap:10px">
        <input type="text" id="newTabName" placeholder="New category name..." />
        <button class="btn btn-primary" style="width:auto" onclick="addTab()">Add</button>
      </div>
    </div>
  </div>

</div>

<div id="toast">Synced!</div>

<script>
  let data = null, sha = null;

  // UI: Tab Switching (Guaranteed to work)
  function showPanel(id) {
    console.log('Switching to:', id);
    const panels = ['add', 'browse', 'tabs'];
    panels.forEach(p => {
      document.getElementById('panel-' + p).style.display = (p === id) ? 'block' : 'none';
      document.getElementById('tab-' + p).classList.toggle('active', p === id);
    });
    if(id === 'browse') renderEntries();
    if(id === 'tabs') renderTabs();
  }

  // API: Connect
  async function connect() {
    const t = document.getElementById('ghToken').value, r = document.getElementById('ghRepo').value;
    if(!t || !r) return alert('Fill both fields');
    
    try {
      const res = await fetch(`https://api.github.com/repos/xCaptaiN09/${r}/contents/public/index.json`, { headers: { 'Authorization': `token ${t}` } });
      if(!res.ok) throw new Error('Repo/File not found');
      const file = await res.json();
      sha = file.sha;
      const bin = atob(file.content.replace(/\n/g, ''));
      const bytes = new Uint8Array(bin.length); for(let i=0; i<bin.length; i++) bytes[i] = bin.charCodeAt(i);
      data = JSON.parse(new TextDecoder().decode(bytes));
      
      localStorage.setItem('v2_token', t); localStorage.setItem('v2_repo', r);
      document.getElementById('statusDot').classList.add('active');
      document.getElementById('statusText').innerText = 'CONNECTED';
      document.getElementById('configCard').style.display = 'none';
      
      initDropdowns();
      showToast('CONNECTED');
    } catch(e) { alert(e.message); }
  }

  function initDropdowns() {
    const tabs = Object.keys(data).filter(k => Array.isArray(data[k]));
    const html = tabs.map(t => `<option value="${t}">${t.toUpperCase()}</option>`).join('');
    document.getElementById('f-tab').innerHTML = html;
    document.getElementById('b-tab').innerHTML = html;
  }

  function renderEntries() {
    const tab = document.getElementById('b-tab').value, list = document.getElementById('entryList');
    if(!data || !data[tab]) return;
    list.innerHTML = data[tab].map((e, i) => `
      <div class="entry-item">
        <div><b>${e.name}</b><div style="font-size:10px; color:var(--muted)">${e.date}</div></div>
        <button class="btn btn-danger" style="padding:5px 10px; font-size:10px" onclick="deleteEntry('${tab}', ${i})">Delete</button>
      </div>`).join('');
  }

  function renderTabs() {
    const list = document.getElementById('tabList');
    if(!data) return;
    const tabs = Object.keys(data).filter(k => Array.isArray(data[k]));
    list.innerHTML = tabs.map(t => `
      <div class="entry-item">
        <b>${t.toUpperCase()}</b>
        <button class="btn btn-danger" style="padding:5px 10px; font-size:10px" onclick="deleteTab('${t}')">Remove</button>
      </div>`).join('');
  }

  function parseUrl(val) {
    // Basic detection for Archive.org
    if(val.includes('archive.org/download/')) {
       showToast('ARCHIVE URL DETECTED');
    }
  }

  async function saveEntry() {
    const tab = document.getElementById('f-tab').value;
    const entry = {
      name: document.getElementById('f-name').value,
      version: document.getElementById('f-ver').value,
      size: document.getElementById('f-size').value,
      date: document.getElementById('f-date').value || new Date().toISOString().split('T')[0],
      url: document.getElementById('f-url').value,
      changelog: document.getElementById('f-changelog').value
    };
    if(tab === 'roms') entry.android = document.getElementById('f-android').value;
    
    data[tab].unshift(entry);
    await commit(`Add ${entry.name}`);
    clearForm();
  }

  async function commit(msg) {
    const t = localStorage.getItem('v2_token'), r = localStorage.getItem('v2_repo');
    document.getElementById('loader').style.display = 'flex';
    try {
      const bytes = new TextEncoder().encode(JSON.stringify(data, null, 2));
      const res = await fetch(`https://api.github.com/repos/xCaptaiN09/${r}/contents/public/index.json`, {
        method: 'PUT',
        headers: { 'Authorization': `token ${t}`, 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: msg, content: btoa(String.fromCharCode(...bytes)), sha: sha })
      });
      const resData = await res.json();
      sha = resData.content.sha;
      showToast('SYNCED');
    } catch(e) { alert(e.message); }
    finally { document.getElementById('loader').style.display = 'none'; }
  }

  function deleteEntry(tab, i) {
    if(!confirm('Delete?')) return;
    data[tab].splice(i, 1);
    commit('Deleted Entry').then(renderEntries);
  }

  function addTab() {
    const n = document.getElementById('newTabName').value.toLowerCase().replace(/ /g, '_');
    if(!n || data[n]) return alert('Invalid');
    data[n] = [];
    commit('Added Tab: ' + n).then(() => { initDropdowns(); renderTabs(); });
  }

  function deleteTab(t) {
    if(!confirm('Delete Category?')) return;
    delete data[t];
    commit('Deleted Tab: ' + t).then(() => { initDropdowns(); renderTabs(); });
  }

  function clearForm() {
    ['f-name','f-ver','f-size','f-url','f-changelog'].forEach(i => document.getElementById(id).value = '');
  }

  function showToast(m) {
    const t = document.getElementById('toast'); t.innerText = m; t.classList.add('show');
    setTimeout(()=>t.classList.remove('show'), 3000);
  }

  // Load Saved
  const sT = localStorage.getItem('v2_token'), sR = localStorage.getItem('v2_repo');
  if(sT) document.getElementById('ghToken').value = sT; 
  if(sR) document.getElementById('ghRepo').value = sR;
  if(sT && sR) connect();

</script>
</body>
</html>
