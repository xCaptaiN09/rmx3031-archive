<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RMX3031 Admin V2.5 BUGFIX</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Outfit:wght@400;600;800&family=Archivo+Black&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e1a14; --surface: #1a2e26; --surface2: #243d34;
    --border: rgba(143, 188, 143, 0.2); --accent: #8fbc8f;
    --text: #f5f5f0; --muted: rgba(245, 245, 240, 0.4);
    --red: #fca5a5;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg); color: var(--text); font-family: 'Outfit', sans-serif; min-height: 100vh; padding: 20px; }
  .container { max-width: 900px; margin: 0 auto; }
  
  header { margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.3); padding: 20px; border-radius: 25px; border: 1px solid var(--border); }
  h1 { font-family: 'Archivo Black'; font-size: 18px; text-transform: uppercase; }
  
  .main-nav { display: flex; gap: 10px; margin-bottom: 25px; background: var(--surface); padding: 10px; border-radius: 20px; border: 1px solid var(--border); }
  .nav-btn { flex: 1; padding: 15px; border-radius: 14px; border: 1px solid transparent; background: transparent; color: var(--muted); font-weight: 900; cursor: pointer; text-transform: uppercase; font-size: 12px; transition: 0.2s; }
  .nav-btn.active { background: var(--accent); color: var(--bg); border-color: var(--accent); box-shadow: 0 4px 15px rgba(0,0,0,0.3); }

  /* FIX: Ensure hidden panels stay hidden */
  .panel { display: none !important; visibility: hidden; }
  .panel.active { display: block !important; visibility: visible; }

  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 30px; padding: 30px; margin-bottom: 20px; }
  .card-title { font-size: 10px; font-family: 'JetBrains Mono'; color: var(--accent); margin-bottom: 20px; text-transform: uppercase; letter-spacing: 2px; }

  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
  .form-group { display: flex; flex-direction: column; gap: 5px; }
  .full { grid-column: 1 / -1; }
  label { font-size: 10px; font-family: 'JetBrains Mono'; color: var(--muted); text-transform: uppercase; }
  input, select, textarea { background: var(--surface2); border: 1px solid var(--border); border-radius: 12px; padding: 12px; color: var(--text); outline: none; font-family: 'Outfit'; font-size: 14px; }
  
  .btn { padding: 12px 25px; border-radius: 12px; border: none; font-weight: 800; cursor: pointer; transition: 0.2s; font-family: 'Outfit'; text-transform: uppercase; font-size: 12px; display: inline-flex; align-items: center; justify-content: center; gap: 8px; }
  .btn-primary { background: var(--accent); color: var(--bg); }
  .btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
  .btn-danger { background: rgba(252, 165, 165, 0.1); color: var(--red); border: 1px solid var(--red); }

  .sub-tabs { display: flex; gap: 8px; margin-bottom: 20px; overflow-x: auto; padding-bottom: 5px; }
  .sub-tab { flex-shrink: 0; padding: 8px 16px; border-radius: 10px; background: var(--surface2); border: 1px solid var(--border); color: var(--muted); font-size: 11px; cursor: pointer; font-weight: 700; text-transform: uppercase; }
  .sub-tab.active { background: var(--text); color: var(--bg); }

  .entry-item { display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; background: var(--surface2); border-radius: 16px; margin-bottom: 10px; }
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); display: none; justify-content: center; align-items: center; z-index: 9999; }
  .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 30px; padding: 40px; width: 90%; max-width: 450px; text-align: center; }
  #toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(100px); padding: 15px 40px; background: var(--accent); color: var(--bg); border-radius: 50px; font-weight: 900; transition: 0.4s; z-index: 10000; text-transform: uppercase; }
</style>
</head>
<body>

<div id="toast">Synced!</div>

<div id="loader" style="position:fixed; inset:0; background:rgba(0,0,0,0.8); z-index:10001; display:none; flex-direction:column; align-items:center; justify-content:center;">
  <div style="font-family:'Archivo Black'; color:var(--accent); font-size:24px">SYNCING DATA...</div>
</div>

<div class="container">
  <header>
    <h1>RMX3031 <span>Admin</span></h1>
    <div style="text-align:right">
      <div id="verTag" style="font-family:'JetBrains Mono'; font-size:10px; color:var(--accent)">BUGFIX V2.5</div>
      <button onclick="location.reload()" style="background:transparent; border:none; color:var(--red); font-size:9px; cursor:pointer; text-decoration:underline">Force Reload</button>
    </div>
  </header>

  <!-- Connection -->
  <div class="card" id="card-config">
    <div class="card-title">Cloud Connection</div>
    <div style="display:grid; grid-template-columns: 1fr 1fr auto; gap:10px">
      <input type="password" id="ghToken" placeholder="GitHub Token" />
      <input type="text" id="ghRepo" placeholder="Repo Name" />
      <button class="btn btn-primary" onclick="initConnection()">Connect</button>
    </div>
  </div>

  <!-- Tabs Navigation -->
  <div class="main-nav">
    <button class="nav-btn active" id="btn-add" onclick="jumpTo('add')">Add Entry</button>
    <button class="nav-btn" id="btn-browse" onclick="jumpTo('browse')">Browse Files</button>
    <button class="nav-btn" id="btn-tabs" onclick="jumpTo('tabs')">Manage Tabs</button>
  </div>

  <!-- Add Panel -->
  <div id="panel-add" class="panel active">
    <div class="card">
      <div class="card-title" id="form-header">Add New Entry</div>
      <div class="form-grid">
        <div class="form-group full"><label>Category</label><select id="f-cat" onchange="updatePreview()"></select></div>
        <div class="form-group"><label>Display Name</label><input type="text" id="f-name" oninput="updatePreview()" /></div>
        <div class="form-group"><label>Version</label><input type="text" id="f-ver" oninput="updatePreview()" /></div>
        <div class="form-group"><label>File Size</label><input type="text" id="f-size" oninput="updatePreview()" /></div>
        <div class="form-group"><label>Date</label><input type="date" id="f-date" oninput="updatePreview()" /></div>
        <div class="form-group full" id="f-android-box"><label>Android</label><input type="text" id="f-android" oninput="updatePreview()" /></div>
        <div class="form-group full"><label>URL (Archive.org Link)</label><input type="text" id="f-url" oninput="updatePreview()" /></div>
        <div class="form-group full"><label>Changelog</label><textarea id="f-changelog" oninput="updatePreview()" style="height:100px"></textarea></div>
      </div>
      <button class="btn btn-primary" style="width:100%; margin-top:20px" id="btn-publish" onclick="submitToGitHub()">Publish Changes</button>
      <button class="btn btn-secondary" style="width:100%; margin-top:10px; display:none" id="btn-cancel" onclick="resetForm()">Cancel Edit</button>
    </div>
  </div>

  <!-- Browse Panel -->
  <div id="panel-browse" class="panel">
    <div class="card">
      <div class="card-title">Browse Archive</div>
      <div class="sub-tabs" id="sub-tabs-list"></div>
      <div id="entry-list-container">Connect to GitHub to see files.</div>
    </div>
  </div>

  <!-- Tab Manager Panel -->
  <div id="panel-tabs" class="panel">
    <div class="card">
      <div class="card-title">Category Management</div>
      <div id="tabs-manager-container">Connect to GitHub to see categories.</div>
      <div style="margin-top:20px; display:flex; gap:10px">
        <input type="text" id="new-tab-name" placeholder="Category Name" style="flex:1" />
        <button class="btn btn-primary" onclick="createCategory()">Create</button>
      </div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="del-modal">
  <div class="modal">
    <h2 style="color:var(--red)">CONFIRM DELETE</h2>
    <p id="del-msg" style="margin:20px 0; font-size:14px"></p>
    <input type="text" id="del-confirm-input" placeholder="Type DELETE" style="text-align:center" oninput="checkDelKey()" />
    <div style="display:flex; gap:10px; margin-top:30px">
      <button class="btn btn-secondary" style="flex:1" onclick="closeDelModal()">Cancel</button>
      <button class="btn btn-danger" id="del-final-btn" style="flex:1" disabled onclick="confirmDeletion()">Delete</button>
    </div>
  </div>
</div>

<script>
  let db = null, sha = null, editing = null, activeCat = null, delTask = null;

  function jumpTo(target) {
    const panels = ['add', 'browse', 'tabs'];
    panels.forEach(name => {
      const p = document.getElementById('panel-' + name);
      const b = document.getElementById('btn-' + name);
      if(name === target) {
        p.classList.add('active');
        b.classList.add('active');
      } else {
        p.classList.remove('active');
        b.classList.remove('active');
      }
    });
    if(target === 'browse') refreshEntryList();
    if(target === 'tabs') refreshTabManager();
  }

  async function initConnection() {
    const t = document.getElementById('ghToken').value.trim();
    const r = document.getElementById('ghRepo').value.trim().replace('https://github.com/','').replace('github.com/','').split('/').filter(p=>p).pop();
    if(!t || !r) return alert('Token/Repo required');
    try {
      const res = await fetch(`https://api.github.com/repos/xCaptaiN09/${r}/contents/public/index.json`, { headers: {'Authorization': `token ${t}`} });
      if(!res.ok) throw new Error('Repo not found');
      const file = await res.json(); sha = file.sha;
      const bytes = new Uint8Array(atob(file.content.replace(/\n/g, '')).split('').map(c => c.charCodeAt(0)));
      db = JSON.parse(new TextDecoder().decode(bytes));
      localStorage.setItem('v2_token', t); localStorage.setItem('v2_repo', r);
      document.getElementById('card-config').style.display = 'none';
      initFields(); showToast('CONNECTED');
    } catch(e) { alert(e.message); }
  }

  function initFields() {
    if(!db) return;
    const cats = Object.keys(db).filter(k => Array.isArray(db[k]));
    document.getElementById('f-cat').innerHTML = cats.map(c => `<option value="${c}">${c.toUpperCase()}</option>`).join('');
    if(!activeCat) activeCat = cats[0];
    updatePreview();
  }

  function updatePreview() {
    if(!db) return;
    const cat = document.getElementById('f-cat').value;
    document.getElementById('f-android-box').style.display = (cat==='roms'?'block':'none');
  }

  async function submitToGitHub() {
    const cat = document.getElementById('f-cat').value;
    const entry = {
      name: document.getElementById('f-name').value, version: document.getElementById('f-ver').value,
      size: document.getElementById('f-size').value, date: document.getElementById('f-date').value || new Date().toISOString().split('T')[0],
      url: document.getElementById('f-url').value, changelog: document.getElementById('f-changelog').value
    };
    if(cat === 'roms') entry.android = document.getElementById('f-android').value || "16";
    if(!entry.name || !entry.url) return alert('Missing info');
    if(editing) db[editing.tab][editing.idx] = entry; else db[cat].unshift(entry);
    await sync(`Update: ${entry.name}`);
    resetForm(); initFields();
  }

  async function sync(msg) {
    const t = localStorage.getItem('v2_token'), r = localStorage.getItem('v2_repo');
    document.getElementById('loader').style.display = 'flex';
    try {
      const bytes = new TextEncoder().encode(JSON.stringify(db, null, 2));
      const res = await fetch(`https://api.github.com/repos/xCaptaiN09/${r}/contents/public/index.json`, {
        method: 'PUT', headers: {'Authorization': `token ${t}`, 'Content-Type': 'application/json'},
        body: JSON.stringify({ message: msg, content: btoa(String.fromCharCode(...bytes)), sha: sha })
      });
      if(!res.ok) throw new Error('Commit failed');
      const resData = await res.json(); sha = resData.content.sha; showToast('SYNCED');
    } catch(e) { alert(e.message); } finally { document.getElementById('loader').style.display = 'none'; }
  }

  function refreshEntryList() {
    const list = document.getElementById('entry-list-container');
    if(!db) return;
    const cats = Object.keys(db).filter(k => Array.isArray(db[k]));
    document.getElementById('sub-tabs-list').innerHTML = cats.map(c => `<button class="sub-tab ${c===activeCat?'active':''}" onclick="setCat('${c}')">${c}</button>`).join('');
    const items = db[activeCat] || [];
    if(items.length === 0) return list.innerHTML = 'No files.';
    list.innerHTML = items.map((e, i) => `
      <div class="entry-item">
        <div><b>${e.name}</b><div style="font-size:10px; color:var(--muted)">${e.date} • ${e.version}</div></div>
        <div style="display:flex; gap:10px"><button class="btn btn-secondary" style="padding:6px 12px; font-size:10px" onclick="beginEdit('${activeCat}', ${i})">Edit</button>
        <button class="btn btn-danger" style="padding:6px 12px; font-size:10px" onclick="openDelModal('entry', '${activeCat}', ${i})">Delete</button></div>
      </div>`).join('');
  }

  function setCat(c) { activeCat = c; refreshEntryList(); }

  function refreshTabManager() {
    if(!db) return;
    const cats = Object.keys(db).filter(k => Array.isArray(db[k]));
    document.getElementById('tabs-manager-container').innerHTML = cats.map(c => `
      <div class="entry-item">
        <b style="color:var(--accent)">${c.toUpperCase()}</b>
        <button class="btn btn-danger" style="padding:8px 12px; font-size:10px" onclick="openDelModal('tab', '${c}')">Remove</button>
      </div>`).join('');
  }

  function beginEdit(tab, i) {
    const e = db[tab][i]; editing = {tab, idx: i};
    document.getElementById('f-cat').value = tab;
    document.getElementById('f-name').value = e.name; document.getElementById('f-ver').value = e.version || '';
    document.getElementById('f-size').value = e.size || ''; document.getElementById('f-date').value = e.date;
    document.getElementById('f-android').value = e.android || ''; document.getElementById('f-changelog').value = e.changelog || '';
    document.getElementById('f-url').value = e.url;
    document.getElementById('form-header').innerText = 'EDITING: ' + e.name;
    document.getElementById('btn-cancel').style.display = 'block';
    document.getElementById('btn-publish').innerText = 'Save';
    jumpTo('add');
  }

  function resetForm() {
    editing = null;
    ['f-name','f-ver','f-size','f-changelog','f-url','f-android'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('f-date').value = new Date().toISOString().split('T')[0];
    document.getElementById('form-header').innerText = 'ADD NEW ENTRY';
    document.getElementById('btn-cancel').style.display = 'none';
    document.getElementById('btn-publish').innerText = 'Publish';
  }

  async function createCategory() {
    const n = document.getElementById('new-tab-name').value.trim().toLowerCase().replace(/ /g, '_');
    if(!n || db[n]) return alert('Invalid');
    db[n] = []; await sync('New Tab'); document.getElementById('new-tab-name').value = ''; initFields(); refreshTabManager();
  }

  function openDelModal(type, tab, idx) {
    delTask = {type, tab, idx};
    document.getElementById('del-msg').innerText = `Delete ${type}: ${type==='tab' ? tab : db[tab][idx].name}?`;
    document.getElementById('del-confirm-input').value = ''; document.getElementById('del-final-btn').disabled = true;
    document.getElementById('del-modal').style.display = 'flex';
  }
  function closeDelModal() { document.getElementById('del-modal').style.display = 'none'; }
  function checkDelKey() { document.getElementById('del-final-btn').disabled = (document.getElementById('del-confirm-input').value !== 'DELETE'); }
  async function confirmDeletion() {
    if(delTask.type==='tab') delete db[delTask.tab]; else db[delTask.tab].splice(delTask.idx, 1);
    await sync('Deleted'); closeDelModal(); initFields(); jumpTo(delTask.type==='tab' ? 'tabs' : 'browse');
  }

  function showToast(m) { const t = document.getElementById('toast'); t.innerText = m; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'), 3000); }

  window.onload = () => {
    const sT = localStorage.getItem('v2_token'), sR = localStorage.getItem('v2_repo');
    if(sT) document.getElementById('ghToken').value = sT; if(sR) document.getElementById('ghRepo').value = sR;
    if(sT && sR) initConnection();
  };
</script>
</body>
</html>
