<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RMX3031 Admin V2.6 ULTRA-FIX</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Outfit:wght@400;600;800&family=Archivo+Black&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d1a14; --surface: #162920; --surface2: #1e362c;
    --border: rgba(143, 188, 143, 0.2); --accent: #8fbc8f;
    --text: #f5f5f0; --muted: rgba(245, 245, 240, 0.4);
    --red: #fca5a5;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg); color: var(--text); font-family: 'Outfit', sans-serif; min-height: 100vh; padding: 20px; }
  .container { max-width: 900px; margin: 0 auto; }
  
  /* Header */
  header { margin-bottom: 25px; display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.4); padding: 25px; border-radius: 30px; border: 1px solid var(--border); }
  h1 { font-family: 'Archivo Black'; font-size: 20px; text-transform: uppercase; }
  h1 span { color: var(--accent); }

  /* Navigation Bar - Bulletproof */
  .main-nav { display: flex; gap: 8px; margin-bottom: 30px; background: var(--surface); padding: 10px; border-radius: 25px; border: 2px solid var(--border); }
  .nav-btn { flex: 1; padding: 16px; border-radius: 18px; border: none; background: transparent; color: var(--muted); font-weight: 900; cursor: pointer; text-transform: uppercase; font-size: 11px; letter-spacing: 1px; transition: 0.25s; }
  .nav-btn.active { background: var(--accent); color: var(--bg); box-shadow: 0 10px 20px rgba(0,0,0,0.3); transform: translateY(-2px); }

  /* Panels - Force Hidden */
  .panel-section { display: none !important; }
  .panel-section.active { display: block !important; }

  /* Components */
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 35px; padding: 35px; margin-bottom: 20px; position: relative; overflow: hidden; }
  .card-title { font-size: 10px; font-family: 'JetBrains Mono'; color: var(--accent); margin-bottom: 25px; text-transform: uppercase; letter-spacing: 2px; font-weight: 800; border-bottom: 1px solid var(--border); padding-bottom: 10px; }

  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
  .form-group { display: flex; flex-direction: column; gap: 8px; }
  .full { grid-column: 1 / -1; }
  label { font-size: 10px; font-family: 'JetBrains Mono'; color: var(--muted); text-transform: uppercase; }
  input, select, textarea { background: var(--surface2); border: 1px solid var(--border); border-radius: 16px; padding: 15px; color: var(--text); outline: none; font-family: 'Outfit'; font-size: 14px; transition: 0.2s; }
  input:focus { border-color: var(--accent); }
  
  .btn { padding: 15px 30px; border-radius: 18px; border: none; font-weight: 900; cursor: pointer; transition: 0.3s; font-family: 'Outfit'; text-transform: uppercase; font-size: 12px; display: inline-flex; align-items: center; justify-content: center; gap: 10px; }
  .btn:active { transform: scale(0.95); }
  .btn-primary { background: var(--accent); color: var(--bg); width: 100%; }
  .btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
  .btn-danger { background: rgba(252, 165, 165, 0.1); color: var(--red); border: 1px solid var(--red); }

  /* Browse Categories List */
  .sub-tabs { display: flex; gap: 10px; margin-bottom: 25px; overflow-x: auto; padding-bottom: 10px; scrollbar-width: none; }
  .sub-tab { flex-shrink: 0; padding: 10px 20px; border-radius: 14px; background: var(--surface2); border: 1px solid var(--border); color: var(--muted); font-size: 11px; cursor: pointer; font-weight: 800; text-transform: uppercase; }
  .sub-tab.active { background: var(--text); color: var(--bg); border-color: var(--text); }

  .entry-item { display: flex; justify-content: space-between; align-items: center; padding: 20px 25px; background: var(--surface2); border-radius: 22px; margin-bottom: 12px; border: 1px solid transparent; }
  .entry-item:hover { border-color: var(--accent); }

  /* Modals */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); display: none; justify-content: center; align-items: center; z-index: 9999; }
  .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 40px; padding: 50px; width: 95%; max-width: 450px; text-align: center; }

  /* Toast */
  #toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(100px); padding: 18px 45px; background: var(--accent); color: var(--bg); border-radius: 50px; font-weight: 900; transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); z-index: 10000; text-transform: uppercase; }
  #toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body data-ver="2.6">

<!-- Loading Spinner -->
<div id="loader" style="position:fixed; inset:0; background:rgba(0,0,0,0.85); z-index:20000; display:none; flex-direction:column; align-items:center; justify-content:center;">
  <div style="font-family:'Archivo Black'; color:var(--accent); font-size:32px; letter-spacing:4px">SYNCING</div>
</div>

<div class="container">
  <header>
    <div>
      <h1>Archive <span>Admin</span></h1>
      <div style="font-size:10px; color:var(--accent); font-family:'JetBrains Mono'; margin-top:5px">ULTRA FIX V2.6</div>
    </div>
    <div style="text-align:right">
      <div id="repoTag" style="font-family:'JetBrains Mono'; font-size:9px; color:var(--muted); margin-bottom:5px">NOT CONNECTED</div>
      <button onclick="location.reload()" style="background:transparent; border:none; color:var(--red); font-size:10px; cursor:pointer; font-weight:800; text-decoration:underline">Force Clean Refresh</button>
    </div>
  </header>

  <!-- Navigation -->
  <div class="main-nav">
    <button class="nav-btn active" id="btn-add" onclick="showPanel('add')">Add Entry</button>
    <button class="nav-btn" id="btn-browse" onclick="showPanel('browse')">Browse Database</button>
    <button class="nav-btn" id="btn-tabs" onclick="showPanel('tabs')">Manage Layout</button>
  </div>

  <!-- PANELS -->
  
  <!-- 1. ADD PANEL -->
  <div id="panel-add" class="panel-section active">
    <div class="card" id="card-conn">
      <div class="card-title">Database Setup</div>
      <div class="form-grid">
        <div class="form-group"><label>GitHub Token</label><input type="password" id="ghToken" placeholder="ghp_..." /></div>
        <div class="form-group"><label>Repo Name</label><input type="text" id="ghRepo" placeholder="rmx3031-archive" /></div>
      </div>
      <button class="btn btn-primary" style="margin-top:20px" onclick="doConnect()">Verify & Connect</button>
    </div>

    <div class="card">
      <div class="card-title" id="f-header">New Entry Details</div>
      <div class="form-grid">
        <div class="form-group full"><label>Category</label><select id="f-cat" onchange="preview()"></select></div>
        <div class="form-group"><label>Name</label><input type="text" id="f-name" oninput="preview()" /></div>
        <div class="form-group"><label>Version</label><input type="text" id="f-ver" oninput="preview()" /></div>
        <div class="form-group"><label>Size</label><input type="text" id="f-size" oninput="preview()" /></div>
        <div class="form-group"><label>Date</label><input type="date" id="f-date" oninput="preview()" /></div>
        <div class="form-group full" id="f-android-group"><label>Android</label><input type="text" id="f-android" value="16" oninput="preview()" /></div>
        <div class="form-group full"><label>URL (Archive.org)</label><input type="text" id="f-url" oninput="preview()" /></div>
        <div class="form-group full"><label>Changelog</label><textarea id="f-changelog" oninput="preview()" style="height:120px"></textarea></div>
      </div>
      <div style="margin-top:30px; display:flex; gap:15px">
        <button class="btn btn-primary" style="flex:2" onclick="save()">Publish to GitHub</button>
        <button class="btn btn-secondary" style="flex:1; display:none" id="f-cancel" onclick="abortEdit()">Cancel</button>
      </div>
      <pre id="f-json" style="margin-top:20px; font-size:9px; color:#444; background:#000; padding:15px; border-radius:15px; border:1px solid #111">{}</pre>
    </div>
  </div>

  <!-- 2. BROWSE PANEL -->
  <div id="panel-browse" class="panel-section">
    <div class="card">
      <div class="card-title">Explore Entries</div>
      <div class="sub-tabs" id="browse-cats"></div>
      <div id="browse-list">Loading database...</div>
    </div>
  </div>

  <!-- 3. TABS PANEL -->
  <div id="panel-tabs" class="panel-section">
    <div class="card">
      <div class="card-title">Manage Site Tabs</div>
      <div id="tabs-list">Loading categories...</div>
      <div style="margin-top:30px; background:rgba(0,0,0,0.15); padding:25px; border-radius:25px">
        <label>Add New Tab</label>
        <div style="display:flex; gap:10px; margin-top:10px">
          <input type="text" id="new-tab-input" placeholder="e.g. Firmware" style="flex:1" />
          <button class="btn btn-primary" style="width:auto" onclick="addTab()">Create</button>
        </div>
      </div>
    </div>
  </div>

</div>

<!-- DELETE MODAL -->
<div class="modal-overlay" id="del-modal">
  <div class="modal">
    <h2 style="color:var(--red); font-family:'Archivo Black'">DANGER</h2>
    <p id="del-msg" style="margin:20px 0; font-size:14px; color:var(--text)"></p>
    <p style="font-size:10px; color:var(--red); margin-bottom:10px">Type <span style="font-weight:900">DELETE</span> to confirm</p>
    <input type="text" id="del-key" style="text-align:center; border-color:var(--red)" oninput="checkDel()"/>
    <div style="display:flex; gap:12px; margin-top:30px">
      <button class="btn btn-secondary" style="flex:1" onclick="closeDel()">Cancel</button>
      <button class="btn btn-danger" id="del-btn" style="flex:1" disabled onclick="confirmDel()">Delete</button>
    </div>
  </div>
</div>

<div id="toast">Synced!</div>

<script>
  let DB = null, SHA = null, EDITING = null, DEL_OBJ = null, CUR_CAT = null;

  // --- 1. THE FOOLPROOF NAV SYSTEM ---
  function showPanel(target) {
    console.log("Forcing Panel:", target);
    
    // Select all panels and buttons
    const panels = document.querySelectorAll('.panel-section');
    const buttons = document.querySelectorAll('.nav-btn');

    // Reset everything
    panels.forEach(p => {
      p.classList.remove('active');
      p.style.setProperty('display', 'none', 'important');
    });
    buttons.forEach(b => b.classList.remove('active'));

    // Activate the target
    const targetPanel = document.getElementById('panel-' + target);
    const targetBtn = document.getElementById('btn-' + target);
    
    if(targetPanel && targetBtn) {
       targetPanel.style.setProperty('display', 'block', 'important');
       setTimeout(() => targetPanel.classList.add('active'), 5);
       targetBtn.classList.add('active');
    }

    if(target === 'browse') listEntries();
    if(target === 'tabs') listTabs();
  }

  // --- 2. CONNECTION ---
  async function doConnect() {
    const t = document.getElementById('ghToken').value.trim();
    const r = document.getElementById('ghRepo').value.trim().replace('https://github.com/','').replace('github.com/','').split('/').filter(p=>p).pop();
    if(!t || !r) return alert('Token/Repo missing');

    try {
      const res = await fetch(`https://api.github.com/repos/xCaptaiN09/${r}/contents/public/index.json`, { headers: {'Authorization': `token ${t}`} });
      if(!res.ok) throw new Error('Repository or File not found');
      const file = await res.json();
      SHA = file.sha;
      const bin = atob(file.content.replace(/\n/g, ''));
      const bytes = new Uint8Array(bin.length); for(let i=0; i<bin.length; i++) bytes[i] = bin.charCodeAt(i);
      DB = JSON.parse(new TextDecoder().decode(bytes));
      
      localStorage.setItem('v2_token', t); localStorage.setItem('v2_repo', r);
      document.getElementById('repoTag').innerText = r.toUpperCase();
      document.getElementById('card-conn').style.display = 'none';
      
      initUI();
      showToast('CONNECTED');
    } catch(e) { alert(e.message); }
  }

  function initUI() {
    if(!DB) return;
    const cats = Object.keys(DB).filter(k => Array.isArray(DB[k]));
    document.getElementById('f-cat').innerHTML = cats.map(c => `<option value="${c}">${c.toUpperCase()}</option>`).join('');
    
    document.getElementById('browse-cats').innerHTML = cats.map(c => 
      `<button class="sub-tab ${c===(CUR_CAT||cats[0])?'active':''}" onclick="changeBrowseCat('${c}')">${c}</button>`
    ).join('');
    
    if(!CUR_CAT) CUR_CAT = cats[0];
    preview();
  }

  // --- 3. LOGIC ---
  function preview() {
    if(!DB) return;
    const cat = document.getElementById('f-cat').value;
    document.getElementById('f-android-group').style.display = (cat === 'roms') ? 'flex' : 'none';
    const entry = {
      name: document.getElementById('f-name').value, version: document.getElementById('f-ver').value,
      size: document.getElementById('f-size').value, date: document.getElementById('f-date').value || new Date().toISOString().split('T')[0],
      url: document.getElementById('f-url').value, changelog: document.getElementById('f-changelog').value
    };
    if(cat === 'roms') entry.android = document.getElementById('f-android').value || "16";
    document.getElementById('f-json').innerText = JSON.stringify(entry, null, 2);
  }

  async function save() {
    const cat = document.getElementById('f-cat').value;
    const entry = JSON.parse(document.getElementById('f-json').innerText);
    if(!entry.name || !entry.url) return alert('Name/URL required');

    if(EDITING) DB[EDITING.tab][EDITING.idx] = entry;
    else DB[cat].unshift(entry);

    await sync(`Sync: ${entry.name}`);
    abortEdit(); initUI();
  }

  async function sync(msg) {
    const t = localStorage.getItem('v2_token'), r = localStorage.getItem('v2_repo');
    document.getElementById('loader').style.display = 'flex';
    try {
      const bytes = new TextEncoder().encode(JSON.stringify(DB, null, 2));
      const res = await fetch(`https://api.github.com/repos/xCaptaiN09/${r}/contents/public/index.json`, {
        method: 'PUT', headers: {'Authorization': `token ${t}`, 'Content-Type': 'application/json'},
        body: JSON.stringify({ message: msg, content: btoa(String.fromCharCode(...bytes)), sha: SHA })
      });
      const resData = await res.json(); SHA = resData.content.sha;
      showToast('GITHUB UPDATED');
    } catch(e) { alert(e.message); }
    finally { document.getElementById('loader').style.display = 'none'; }
  }

  // --- 4. PANELS ---
  function changeBrowseCat(c) { CUR_CAT = c; listEntries(); }

  function listEntries() {
    const list = document.getElementById('browse-list');
    if(!DB || !CUR_CAT) return list.innerHTML = 'Connect GitHub first.';
    
    // Refresh subtabs
    const cats = Object.keys(DB).filter(k => Array.isArray(DB[k]));
    document.getElementById('browse-cats').innerHTML = cats.map(c => 
      `<button class="sub-tab ${c===CUR_CAT?'active':''}" onclick="changeBrowseCat('${c}')">${c}</button>`
    ).join('');

    const items = DB[CUR_CAT];
    if(!items || items.length === 0) return list.innerHTML = 'Empty category.';

    list.innerHTML = items.map((e, i) => `
      <div class="entry-item">
        <div><b>${e.name}</b><div style="font-size:10px; color:var(--muted); font-family:'JetBrains Mono'">${e.date} • ${e.version}</div></div>
        <div style="display:flex; gap:10px">
          <button class="btn btn-secondary" style="padding:10px 15px; font-size:10px" onclick="doEdit('${CUR_CAT}', ${i})">Edit</button>
          <button class="btn btn-danger" style="padding:10px 15px; font-size:10px" onclick="triggerDel('entry', '${CUR_CAT}', ${i})">Delete</button>
        </div>
      </div>`).join('');
  }

  function listTabs() {
    const list = document.getElementById('tabs-list');
    if(!DB) return list.innerHTML = 'Connect GitHub first.';
    const cats = Object.keys(DB).filter(k => Array.isArray(DB[k]));
    list.innerHTML = cats.map(t => `
      <div class="entry-item">
        <b style="color:var(--accent); font-family:'JetBrains Mono'">${t.toUpperCase()}</b>
        <div style="display:flex; align-items:center; gap:15px">
           <span style="font-size:10px; color:var(--muted)">${DB[t].length} FILES</span>
           <button class="btn btn-danger" style="padding:10px 15px; font-size:10px" onclick="triggerDel('tab', '${t}')">Remove</button>
        </div>
      </div>`).join('');
  }

  function doEdit(tab, i) {
    const e = DB[tab][i]; EDITING = {tab, idx: i};
    document.getElementById('f-cat').value = tab;
    document.getElementById('f-name').value = e.name; document.getElementById('f-ver').value = e.version || '';
    document.getElementById('f-size').value = e.size || ''; document.getElementById('f-date').value = e.date;
    document.getElementById('f-android').value = e.android || ''; document.getElementById('f-changelog').value = e.changelog || '';
    document.getElementById('f-url').value = e.url;
    document.getElementById('f-header').innerText = 'EDITING: ' + e.name;
    document.getElementById('f-cancel').style.display = 'block';
    showPanel('add');
  }

  function abortEdit() {
    EDITING = null;
    ['f-name','f-ver','f-size','f-changelog','f-url','f-android'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('f-date').value = new Date().toISOString().split('T')[0];
    document.getElementById('f-header').innerText = 'NEW ARCHIVE ENTRY';
    document.getElementById('f-cancel').style.display = 'none';
    preview();
  }

  async function addTab() {
    const n = document.getElementById('new-tab-input').value.trim().toLowerCase().replace(/ /g, '_');
    if(!n || DB[n]) return alert('Invalid Key');
    DB[n] = []; await sync('New Tab: ' + n);
    document.getElementById('new-tab-input').value = ''; initUI(); listTabs();
  }

  // --- 5. DELETION ---
  function triggerDel(type, tab, idx) {
    DEL_OBJ = {type, tab, idx};
    const name = (type === 'tab') ? tab.toUpperCase() : DB[tab][idx].name;
    document.getElementById('del-msg').innerText = `Permenently delete ${type}: "${name}"?`;
    document.getElementById('del-key').value = ''; document.getElementById('del-btn').disabled = true;
    document.getElementById('del-modal').style.display = 'flex';
  }
  function closeDel() { document.getElementById('del-modal').style.display = 'none'; }
  function checkDel() { document.getElementById('del-btn').disabled = (document.getElementById('del-key').value !== 'DELETE'); }
  async function confirmDel() {
    if(DEL_OBJ.type === 'tab') delete DB[DEL_OBJ.tab]; else DB[DEL_OBJ.tab].splice(DEL_OBJ.idx, 1);
    await sync('Deleted'); closeDel(); initUI(); if(DEL_OBJ.type === 'tab') listTabs(); else listEntries();
  }

  function showToast(m) {
    const t = document.getElementById('toast'); t.innerText = m; t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3000);
  }

  // Initial Load
  window.addEventListener('DOMContentLoaded', () => {
    document.getElementById('f-date').value = new Date().toISOString().split('T')[0];
    const sT = localStorage.getItem('v2_token'), sR = localStorage.getItem('v2_repo');
    if(sT) document.getElementById('ghToken').value = sT;
    if(sR) document.getElementById('ghRepo').value = sR;
    if(sT && sR) doConnect();
  });

</script>
</body>
</html>
