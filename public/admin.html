<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RMX3031 Admin V2.7 SSH</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Outfit:wght@400;600;800&family=Archivo+Black&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a140f; --surface: #12241b; --surface2: #1a3328;
    --border: rgba(143, 188, 143, 0.2); --accent: #8fbc8f;
    --text: #f5f5f0; --muted: rgba(245, 245, 240, 0.4);
    --red: #fca5a5;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg); color: var(--text); font-family: 'Outfit', sans-serif; min-height: 100vh; padding: 20px; }
  .container { max-width: 900px; margin: 0 auto; }
  
  header { margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.3); padding: 20px; border-radius: 25px; border: 1px solid var(--border); }
  h1 { font-family: 'Archivo Black'; font-size: 18px; text-transform: uppercase; }
  h1 span { color: var(--accent); }

  /* Navigation Bar */
  .main-nav { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 25px; background: var(--surface); padding: 8px; border-radius: 20px; border: 1px solid var(--border); }
  .nav-btn { padding: 14px; border-radius: 14px; border: none; background: transparent; color: var(--muted); font-weight: 800; cursor: pointer; text-transform: uppercase; font-size: 11px; transition: 0.2s; }
  .nav-btn.active { background: var(--accent); color: var(--bg); box-shadow: 0 4px 15px rgba(0,0,0,0.3); }

  /* Main Viewport */
  #main-viewport { min-height: 400px; }

  /* Reusable Components */
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 30px; padding: 35px; margin-bottom: 20px; }
  .card-title { font-size: 10px; font-family: 'JetBrains Mono'; color: var(--accent); margin-bottom: 20px; text-transform: uppercase; letter-spacing: 2px; }

  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
  .form-group { display: flex; flex-direction: column; gap: 5px; }
  .full { grid-column: 1 / -1; }
  label { font-size: 10px; font-family: 'JetBrains Mono'; color: var(--muted); text-transform: uppercase; }
  input, select, textarea { background: var(--surface2); border: 1px solid var(--border); border-radius: 12px; padding: 12px; color: var(--text); outline: none; font-family: 'Outfit'; font-size: 14px; width: 100%; }
  
  .btn { padding: 12px 25px; border-radius: 12px; border: none; font-weight: 800; cursor: pointer; transition: 0.2s; font-family: 'Outfit'; display: inline-flex; align-items: center; justify-content: center; gap: 8px; text-transform: uppercase; }
  .btn-primary { background: var(--accent); color: var(--bg); }
  .btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
  .btn-danger { background: rgba(252, 165, 165, 0.1); color: var(--red); border: 1px solid var(--red); }

  .entry-item { display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; background: var(--surface2); border-radius: 16px; margin-bottom: 10px; }
  .sub-tabs { display: flex; gap: 8px; margin-bottom: 20px; overflow-x: auto; padding-bottom: 10px; }
  .sub-tab { flex-shrink: 0; padding: 8px 16px; border-radius: 10px; background: var(--surface2); border: 1px solid var(--border); color: var(--muted); font-size: 11px; cursor: pointer; font-weight: 700; text-transform: uppercase; }
  .sub-tab.active { background: var(--text); color: var(--bg); }

  .loading-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: none; justify-content: center; align-items: center; z-index: 10001; }
  #toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(100px); padding: 15px 40px; background: var(--accent); color: var(--bg); border-radius: 50px; font-weight: 900; transition: 0.4s; z-index: 10000; text-transform: uppercase; }
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: none; justify-content: center; align-items: center; z-index: 9999; backdrop-filter: blur(5px); }
  .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 30px; padding: 40px; width: 90%; max-width: 450px; text-align: center; }
</style>
</head>
<body>

<div id="loader" class="loading-overlay">
  <div style="font-family:'Archivo Black'; color:var(--accent); font-size:24px">SYNCING WITH GITHUB</div>
</div>

<div id="toast">Synced!</div>

<div class="container">
  <header>
    <h1>Archive <span>Admin</span></h1>
    <div style="text-align:right">
      <div style="font-family:'JetBrains Mono'; font-size:10px; color:var(--accent)">SSH V2.7 NUCLEAR</div>
      <button onclick="localStorage.clear(); location.reload();" style="background:transparent; border:none; color:var(--red); font-size:9px; cursor:pointer; text-decoration:underline">Reset Session</button>
    </div>
  </header>

  <!-- Login Section (Only shows if disconnected) -->
  <div id="connection-card" class="card">
    <div class="card-title">Cloud Authorization</div>
    <div style="display:grid; grid-template-columns: 1fr 1fr auto; gap:10px">
      <input type="password" id="ghToken" placeholder="GitHub Token" />
      <input type="text" id="ghRepo" placeholder="Repo Name" />
      <button class="btn btn-primary" onclick="connect()">Connect</button>
    </div>
  </div>

  <!-- Navigation -->
  <div class="main-nav">
    <button class="nav-btn active" id="btn-add" onclick="renderView('add')">Add Entry</button>
    <button class="nav-btn" id="btn-browse" onclick="renderView('browse')">Browse Files</button>
    <button class="nav-btn" id="btn-tabs" onclick="renderView('tabs')">Manage Tabs</button>
  </div>

  <!-- THE VIEWPORT (Where only 1 tab lives at a time) -->
  <div id="main-viewport"></div>

</div>

<!-- Delete Modal -->
<div class="modal-overlay" id="del-modal">
  <div class="modal">
    <h2 style="color:var(--red)">CONFIRM DELETE</h2>
    <p id="del-msg" style="margin:20px 0; font-size:14px; color:var(--muted)"></p>
    <input type="text" id="del-confirm" placeholder="Type DELETE" style="text-align:center" oninput="checkDel()"/>
    <div style="display:flex; gap:10px; margin-top:30px">
      <button class="btn btn-secondary" style="flex:1" onclick="closeDel()">Cancel</button>
      <button class="btn btn-danger" id="del-btn" style="flex:1" disabled onclick="confirmDeletion()">Delete</button>
    </div>
  </div>
</div>

<script>
  let DB = null, SHA = null, EDITING = null, ACTIVE_BROWSE_CAT = null, DEL_TASK = null;

  // --- VIEW RENDERING (The fix for "showing everything") ---
  function renderView(view) {
    console.log("Rendering View:", view);
    const viewport = document.getElementById('main-viewport');
    
    // 1. Update buttons
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('btn-' + view).classList.add('active');

    // 2. CLEAR the viewport completely
    viewport.innerHTML = '';

    // 3. Inject only the requested view
    if(view === 'add') viewport.innerHTML = generateAddView();
    if(view === 'browse') viewport.innerHTML = generateBrowseView();
    if(view === 'tabs') viewport.innerHTML = generateTabsView();

    // 4. Initialize dynamic content
    if(DB) {
       if(view === 'add') initAddForm();
       if(view === 'browse') initBrowseList();
       if(view === 'tabs') initTabsList();
    } else {
       viewport.innerHTML = '<div class="card"><p style="text-align:center; color:var(--muted)">Please connect to GitHub first.</p></div>';
    }
  }

  // --- HTML GENERATORS ---
  function generateAddView() {
    return `
      <div class="card">
        <div class="card-title" id="f-header">New Entry Details</div>
        <div class="form-grid">
          <div class="form-group full"><label>Category</label><select id="f-cat" onchange="toggleAndroidField()"></select></div>
          <div class="form-group"><label>Name</label><input type="text" id="f-name" /></div>
          <div class="form-group"><label>Version</label><input type="text" id="f-ver" /></div>
          <div class="form-group"><label>Size</label><input type="text" id="f-size" /></div>
          <div class="form-group"><label>Date</label><input type="date" id="f-date" /></div>
          <div class="form-group full" id="f-android-box"><label>Android</label><input type="text" id="f-android" value="16" /></div>
          <div class="form-group full"><label>URL</label><input type="text" id="f-url" /></div>
          <div class="form-group full"><label>Changelog</label><textarea id="f-changelog" style="height:100px"></textarea></div>
        </div>
        <button class="btn btn-primary" style="width:100%; margin-top:20px" onclick="saveEntry()">Publish to GitHub</button>
      </div>`;
  }

  function generateBrowseView() {
    return `
      <div class="card">
        <div class="card-title">Browse database</div>
        <div class="sub-tabs" id="b-cats"></div>
        <div id="b-list"></div>
      </div>`;
  }

  function generateTabsView() {
    return `
      <div class="card">
        <div class="card-title">Category Management</div>
        <div id="t-list"></div>
        <div style="margin-top:25px; display:flex; gap:10px">
          <input type="text" id="new-t-name" placeholder="Category name..." />
          <button class="btn btn-primary" onclick="addTab()">Create</button>
        </div>
      </div>`;
  }

  // --- DATA LOGIC ---
  async function connect() {
    const t = document.getElementById('ghToken').value, r = document.getElementById('ghRepo').value;
    try {
      const res = await fetch(`https://api.github.com/repos/xCaptaiN09/${r}/contents/public/index.json`, { headers: {'Authorization': `token ${t}`} });
      if(!res.ok) throw new Error('Repo not found');
      const file = await res.json(); SHA = file.sha;
      const bytes = new Uint8Array(atob(file.content.replace(/\n/g, '')).split('').map(c => c.charCodeAt(0)));
      DB = JSON.parse(new TextDecoder().decode(bytes));
      localStorage.setItem('v2_token', t); localStorage.setItem('v2_repo', r);
      document.getElementById('connection-card').style.display = 'none';
      renderView('add');
    } catch(e) { alert(e.message); }
  }

  function initAddForm() {
    const cats = Object.keys(DB).filter(k => Array.isArray(DB[k]));
    document.getElementById('f-cat').innerHTML = cats.map(c => `<option value="${c}">${c.toUpperCase()}</option>`).join('');
    document.getElementById('f-date').value = new Date().toISOString().split('T')[0];
    toggleAndroidField();
  }

  function toggleAndroidField() {
    const cat = document.getElementById('f-cat').value;
    document.getElementById('f-android-box').style.display = (cat === 'roms' ? 'block' : 'none');
  }

  function initBrowseList() {
    const cats = Object.keys(DB).filter(k => Array.isArray(DB[k]));
    if(!ACTIVE_BROWSE_CAT) ACTIVE_BROWSE_CAT = cats[0];
    document.getElementById('b-cats').innerHTML = cats.map(c => `<button class="sub-tab ${c===ACTIVE_BROWSE_CAT?'active':''}" onclick="ACTIVE_BROWSE_CAT='${c}'; renderView('browse')">${c}</button>`).join('');
    const items = DB[ACTIVE_BROWSE_CAT] || [];
    document.getElementById('b-list').innerHTML = items.length === 0 ? 'No files here.' : items.map((e, i) => `
      <div class="entry-item">
        <div><b>${e.name}</b><div style="font-size:10px; color:var(--muted)">${e.date} • ${e.version}</div></div>
        <button class="btn btn-danger" style="padding:6px 12px; font-size:10px" onclick="openDelModal('entry', '${ACTIVE_BROWSE_CAT}', ${i})">Delete</button>
      </div>`).join('');
  }

  function initTabsList() {
    const cats = Object.keys(DB).filter(k => Array.isArray(DB[k]));
    document.getElementById('t-list').innerHTML = cats.map(c => `
      <div class="entry-item"><b>${c.toUpperCase()}</b><button class="btn btn-danger" style="padding:6px 12px; font-size:10px" onclick="openDelModal('tab', '${c}')">Remove</button></div>
    `).join('');
  }

  async function saveEntry() {
    const entry = {
      name: document.getElementById('f-name').value, version: document.getElementById('f-ver').value,
      size: document.getElementById('f-size').value, date: document.getElementById('f-date').value,
      url: document.getElementById('f-url').value, changelog: document.getElementById('f-changelog').value
    };
    const cat = document.getElementById('f-cat').value;
    if(cat === 'roms') entry.android = document.getElementById('f-android').value;
    DB[cat].unshift(entry);
    commit(`Add ${entry.name}`).then(() => renderView('browse'));
  }

  async function addTab() {
    const n = document.getElementById('new-t-name').value.trim().toLowerCase().replace(/ /g, '_');
    if(!n || DB[n]) return alert('Invalid Key');
    DB[n] = [];
    commit('New Tab: ' + n).then(() => renderView('tabs'));
  }

  async function commit(msg) {
    const t = localStorage.getItem('v2_token'), r = localStorage.getItem('v2_repo');
    document.getElementById('loader').style.display = 'flex';
    try {
      const bytes = new TextEncoder().encode(JSON.stringify(DB, null, 2));
      const res = await fetch(`https://api.github.com/repos/xCaptaiN09/${r}/contents/public/index.json`, {
        method: 'PUT', headers: {'Authorization': `token ${t}`, 'Content-Type': 'application/json'},
        body: JSON.stringify({ message: msg, content: btoa(String.fromCharCode(...bytes)), sha: SHA })
      });
      const data = await res.json(); SHA = data.content.sha;
      showToast('SYNCED');
    } catch(e) { alert(e.message); }
    finally { document.getElementById('loader').style.display = 'none'; }
  }

  function openDelModal(type, tab, idx) {
    DEL_TASK = {type, tab, idx};
    document.getElementById('del-msg').innerText = `Delete ${type}: ${type==='tab' ? tab : DB[tab][idx].name}?`;
    document.getElementById('del-confirm').value = ''; document.getElementById('del-btn').disabled = true;
    document.getElementById('del-modal').style.display = 'flex';
  }
  function closeDel() { document.getElementById('del-modal').style.display = 'none'; }
  function checkDel() { document.getElementById('del-btn').disabled = (document.getElementById('del-confirm').value !== 'DELETE'); }
  async function confirmDeletion() {
    if(DEL_TASK.type==='tab') delete DB[DEL_TASK.tab]; else DB[DEL_TASK.tab].splice(DEL_TASK.idx, 1);
    commit('Deleted').then(() => { closeDel(); renderView(DEL_TASK.type==='tab' ? 'tabs' : 'browse'); });
  }

  function showToast(m) { const t = document.getElementById('toast'); t.innerText = m; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'), 3000); }

  // Initial Boot
  window.onload = () => {
    const sT = localStorage.getItem('v2_token'), sR = localStorage.getItem('v2_repo');
    if(sT && sR) {
       document.getElementById('ghToken').value = sT; 
       document.getElementById('ghRepo').value = sR;
       connect();
    } else {
       renderView('add');
    }
  };
</script>
</body>
</html>
